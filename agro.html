<script>
/* ── CONFIG ── */
var SUPABASE_URL = 'https://ripnqnytrwbaueadrtry.supabase.co';
var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpcG5xbnl0cndiYXVlYWRydHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTk3NjAsImV4cCI6MjA4ODg5NTc2MH0.Ut7V6rG5AoKRbdqpvCeXsQJ4eozZ_nPxE7xKY4FuKOQ';
var VERTICAL_FILTER = 'AGRO';

var _showFrete = false;
var rc = 300;
var MONTH_NAMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var MONTH_NAMES_FULL = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DIAS_SEMANA = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

/* ── CURRENT DATE HELPERS ── */
var NOW = new Date();
var CURRENT_YEAR = NOW.getFullYear();
var CURRENT_MONTH = NOW.getMonth() + 1;
var CURRENT_MONTH_STR = CURRENT_YEAR + '-' + (CURRENT_MONTH < 10 ? '0' : '') + CURRENT_MONTH;
var MONTH_LABEL = MONTH_NAMES[CURRENT_MONTH - 1];

function buildYtdMonths() {
  var months = [];
  for (var m = 1; m <= CURRENT_MONTH; m++) {
    months.push(CURRENT_YEAR + '-' + (m < 10 ? '0' : '') + m);
  }
  return months;
}
var YTD_MONTHS = buildYtdMonths();

function buildAllMonths() {
  var months = [];
  for (var m = 1; m <= 12; m++) {
    months.push(CURRENT_YEAR + '-' + (m < 10 ? '0' : '') + m);
  }
  return months;
}
var ALL_MONTHS = buildAllMonths();

/* ── FORMAT FUNCTIONS ── */
function fmtBRL(v) {
  if (v === null || v === undefined || isNaN(v)) return 'R$ 0';
  var neg = v < 0;
  v = Math.abs(Math.round(v));
  var s = String(v);
  var parts = [];
  while (s.length > 3) {
    parts.unshift(s.slice(s.length - 3));
    s = s.slice(0, s.length - 3);
  }
  parts.unshift(s);
  return (neg ? '-' : '') + 'R$ ' + parts.join('.');
}

function fmtBRLShort(v) {
  if (v === null || v === undefined || isNaN(v)) return '0';
  v = Math.round(v);
  if (Math.abs(v) >= 1000000) return Math.round(v / 1000000) + 'M';
  if (Math.abs(v) >= 1000) return Math.round(v / 1000) + 'k';
  return String(v);
}

function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return '0,0%';
  var s = (v * 100).toFixed(1);
  return s.replace('.', ',') + '%';
}

function fmtPctRaw(v) {
  if (v === null || v === undefined || isNaN(v)) return '0,0%';
  return v.toFixed(1).replace('.', ',') + '%';
}

function pctClass(v) {
  if (v >= 80) return 'good';
  if (v >= 50) return 'low';
  return 'critical';
}

function metricClass(v) {
  if (v >= 5) return 'metric-good';
  if (v >= 0) return 'metric-warning';
  return 'metric-bad';
}

function vertBadge(v) {
  var vl = (v || '').toLowerCase().replace(/[^a-z]/g, '');
  if (vl.indexOf('agro') >= 0) return '<span class="vertical-badge agro">AGRO</span>';
  if (vl.indexOf('agua') >= 0) return '<span class="vertical-badge agua">AGUA</span>';
  if (vl.indexOf('corp') >= 0) return '<span class="vertical-badge corporativo">CORPORATIVO</span>';
  if (vl.indexOf('flor') >= 0) return '<span class="vertical-badge florestas">FLORESTAS</span>';
  return '<span class="vertical-badge">' + (v || '') + '</span>';
}

function safeNum(v) {
  var n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

/* ── SUPABASE FETCH ── */
function sbFetch(view, params, cb) {
  var url = SUPABASE_URL + '/rest/v1/' + view + '?select=*';
  if (params) url += '&' + params;
  fetch(url, {
    headers: {
      'apikey': ANON_KEY,
      'Authorization': 'Bearer ' + ANON_KEY
    }
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    if (Array.isArray(data)) { cb(null, data); }
    else { console.warn('sbFetch '+view+' returned non-array:', data); cb(null, []); }
  })
  .catch(function(err) { console.error('sbFetch '+view+' error:', err); cb(err, []); });
}

/* ── DATA STORE ── */
var DATA = {
  planReal: [],
  planRealConsultor: [],
  movFiscal: [],
  carteira: [],
  planRealCliente: [],
  planRealProduto: [],
  agroConsultores: []
};

var loadCount = 0;
var totalLoads = 6;

function checkAllLoaded() {
  loadCount++;
  if (loadCount >= totalLoads) {
    try { renderAll(); } catch(e) { console.error('renderAll error:', e); }
    var el = document.getElementById('loadingOverlay');
    if (el) el.style.display = 'none';
  }
}
/* Safety: force hide overlay after 20s even if some fetch fails */
setTimeout(function(){
  var el = document.getElementById('loadingOverlay');
  if (el && el.style.display !== 'none') {
    console.warn('Force hiding overlay after timeout. loadCount='+loadCount+'/'+totalLoads);
    try { renderAll(); } catch(e) { console.error('renderAll timeout error:', e); }
    el.style.display = 'none';
  }
}, 20000);

function loadData() {
  loadCount = 0;

  /* vw_plan_vs_real_vertical filtered to AGRO */
  sbFetch('vw_plan_vs_real_vertical', 'id_tempo=like.' + CURRENT_YEAR + '-*&vertical=eq.AGRO', function(err, data) {
    DATA.planReal = data || [];
    checkAllLoaded();
  });

  /* vw_plan_vs_real_consultor filtered to AGRO + active */
  sbFetch('vw_plan_vs_real_consultor', 'id_tempo=like.' + CURRENT_YEAR + '-*&vendedor_ativo=eq.true&vertical=eq.AGRO', function(err, data) {
    DATA.planRealConsultor = data || [];
    /* Build list of AGRO consultores for carteira filtering */
    var cSet = {};
    (data || []).forEach(function(r) {
      var c = r.consultor || r.vendedor || '';
      if (c) cSet[c] = true;
    });
    DATA.agroConsultores = Object.keys(cSet);
    checkAllLoaded();
  });

  /* vw_movimento_fiscal filtered to AGRO — normalize column names */
  sbFetch('vw_movimento_fiscal', 'id_tempo=like.' + CURRENT_YEAR + '-*&vertical=eq.AGRO&limit=10000', function(err, data) {
    DATA.movFiscal = (data || []).map(function(r) {
      r.data_emissao = r.data_faturamento;
      r.cliente = r.nome_cliente;
      r.consultor = r.consultor_agrupado;
      r.vendedor = r.representante;
      r.vlr_contabil = safeNum(r.receita_liquida);
      r.produto = r.produto_nome;
      r.categoria_produto = r.produto_nome;
      r.operacao = r.operacao_gerencial;
      return r;
    });
    checkAllLoaded();
  });

  /* vw_carteira_pedidos_unificada - filter after load by AGRO — normalize column names */
  sbFetch('vw_carteira_pedidos_unificada', 'status_pedido=eq.ABERTO', function(err, data) {
    DATA.carteira = (data || []).filter(function(r) {
      var v = (r.vertical || '').toUpperCase();
      return v === 'AGRO';
    }).map(function(r) {
      r.consultor = r.representante;
      r.vendedor = r.representante;
      r.cliente = r.nome_cliente;
      r.produto = r.produto_nome;
      return r;
    });
    checkAllLoaded();
  });

  /* vw_plan_vs_real_cliente filtered to AGRO (view has no id_tempo — annual aggregate) */
  sbFetch('vw_plan_vs_real_cliente', 'vertical=eq.AGRO', function(err, data) {
    DATA.planRealCliente = (data || []).map(function(r) {
      r.meta = safeNum(r.receita_plan);
      r.realizado = safeNum(r.receita_real);
      return r;
    });
    checkAllLoaded();
  });

  /* vw_plan_vs_real_produto — normalize column names */
  sbFetch('vw_plan_vs_real_produto', 'id_tempo=like.' + CURRENT_YEAR + '-*&vertical=eq.AGRO', function(err, data) {
    DATA.planRealProduto = (data || []).map(function(r) {
      r.meta = safeNum(r.receita_plan);
      r.realizado = safeNum(r.receita_real);
      return r;
    });
    checkAllLoaded();
  });
}

/* ── KPIs ── */
function renderKPIs() {
  var mesReal = 0, mesMeta = 0;
  var ytdReal = 0, ytdMeta = 0;
  var anoReal = 0, anoMeta = 0;
  var mesFrete = 0, ytdFrete = 0;

  DATA.planReal.forEach(function(r) {
    var meta = safeNum(r.meta);
    var real = safeNum(r.realizado);
    if (r.id_tempo === CURRENT_MONTH_STR) {
      mesReal += real;
      mesMeta += meta;
    }
    if (YTD_MONTHS.indexOf(r.id_tempo) >= 0) {
      ytdReal += real;
      ytdMeta += meta;
    }
    anoReal += real;
    anoMeta += meta;
  });

  DATA.movFiscal.forEach(function(r) {
    var frete = safeNum(r.frete_rateado);
    if (r.id_tempo === CURRENT_MONTH_STR) {
      mesFrete += frete;
    }
    if (YTD_MONTHS.indexOf(r.id_tempo) >= 0) {
      ytdFrete += frete;
    }
  });

  var carteiraTotal = 0;
  DATA.carteira.forEach(function(r) {
    carteiraTotal += safeNum(r.vlr_carteira);
  });

  var mesAtingPct = mesMeta > 0 ? (mesReal / mesMeta * 100) : 0;
  var mesAtingPctCF = mesMeta > 0 ? ((mesReal + mesFrete) / mesMeta * 100) : 0;
  var ytdAtingPct = ytdMeta > 0 ? (ytdReal / ytdMeta * 100) : 0;
  var ytdAtingPctCF = ytdMeta > 0 ? ((ytdReal + ytdFrete) / ytdMeta * 100) : 0;
  var anoAtingPct = anoMeta > 0 ? (anoReal / anoMeta * 100) : 0;
  var anoAtingPctCF = anoMeta > 0 ? ((anoReal + ytdFrete) / anoMeta * 100) : 0;
  var carteiraPctMeta = anoMeta > 0 ? (carteiraTotal / anoMeta * 100) : 0;

  var html = '';
  html += '<div class="kpi-card"><div class="kpi-title">Mes Atual — AGRO</div>';
  html += '<div class="kpi-value"><span data-sf="' + fmtBRL(mesReal) + '" data-cf="' + fmtBRL(mesReal + mesFrete) + '">' + fmtBRL(mesReal) + '</span></div>';
  html += '<div class="kpi-row"><span class="kpi-label">Meta:</span><span class="kpi-number">' + fmtBRL(mesMeta) + '</span></div>';
  html += '<div class="kpi-row"><span class="kpi-label">Ating:</span><span class="kpi-number"><span data-sf="' + fmtPctRaw(mesAtingPct) + '" data-cf="' + fmtPctRaw(mesAtingPctCF) + '">' + fmtPctRaw(mesAtingPct) + '</span></span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(mesAtingPct, 100) + '%"></div></div></div>';

  html += '<div class="kpi-card"><div class="kpi-title">YTD Acumulado</div>';
  html += '<div class="kpi-value"><span data-sf="' + fmtBRL(ytdReal) + '" data-cf="' + fmtBRL(ytdReal + ytdFrete) + '">' + fmtBRL(ytdReal) + '</span></div>';
  html += '<div class="kpi-row"><span class="kpi-label">Meta:</span><span class="kpi-number">' + fmtBRL(ytdMeta) + '</span></div>';
  html += '<div class="kpi-percent ' + pctClass(ytdAtingPct) + '"><span data-sf="' + fmtPctRaw(ytdAtingPct) + '" data-cf="' + fmtPctRaw(ytdAtingPctCF) + '">' + fmtPctRaw(ytdAtingPct) + '</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(ytdAtingPct, 100) + '%"></div></div></div>';

  html += '<div class="kpi-card"><div class="kpi-title">Progresso Anual</div>';
  html += '<div class="kpi-value"><span data-sf="' + fmtBRL(anoReal) + '" data-cf="' + fmtBRL(anoReal + ytdFrete) + '">' + fmtBRL(anoReal) + '</span></div>';
  html += '<div class="kpi-row"><span class="kpi-label">Meta:</span><span class="kpi-number">' + fmtBRL(anoMeta) + '</span></div>';
  html += '<div class="kpi-percent ' + pctClass(anoAtingPct) + '"><span data-sf="' + fmtPctRaw(anoAtingPct) + '" data-cf="' + fmtPctRaw(anoAtingPctCF) + '">' + fmtPctRaw(anoAtingPct) + '</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(anoAtingPct, 100) + '%"></div></div></div>';

  html += '<div class="kpi-card"><div class="kpi-title">Carteira Pedidos</div>';
  html += '<div class="kpi-value">' + fmtBRL(carteiraTotal) + '</div>';
  html += '<div class="kpi-row"><span class="kpi-label">% Meta:</span><span class="kpi-number">' + fmtPctRaw(carteiraPctMeta) + '</span></div>';
  var carteiraStatus = carteiraPctMeta >= 15 ? 'Bom' : carteiraPctMeta >= 8 ? 'Moderado' : 'Critico';
  var carteiraStatusClass = carteiraPctMeta >= 15 ? 'positive' : carteiraPctMeta >= 8 ? 'warning' : 'warning';
  html += '<div class="kpi-row"><span class="kpi-label">Status:</span><span class="kpi-number ' + carteiraStatusClass + '">' + carteiraStatus + '</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(carteiraPctMeta, 100) + '%"></div></div></div>';

  document.getElementById('kpiSection').innerHTML = html;
}

/* ── CLIENTE TABLE (Faturamento por Cliente) ── */
function renderClienteTable() {
  var monthData = DATA.movFiscal.filter(function(r) { return r.id_tempo === CURRENT_MONTH_STR; });

  /* Group by date + client for daily subtotals */
  var grouped = {};
  var totalSF = 0, totalCF = 0;
  monthData.forEach(function(r) {
    var dt = r.data_emissao || r.id_tempo || '';
    var key = dt + '|' + (r.cliente || '');
    if (!grouped[key]) {
      grouped[key] = {
        data: dt,
        cliente: r.cliente || '',
        consultor: r.consultor || r.vendedor || '',
        vlr_contabil: 0,
        frete: 0
      };
    }
    grouped[key].vlr_contabil += safeNum(r.vlr_contabil);
    grouped[key].frete += safeNum(r.frete_rateado);
  });

  var rows = [];
  for (var k in grouped) {
    if (grouped.hasOwnProperty(k)) {
      rows.push(grouped[k]);
      totalSF += grouped[k].vlr_contabil;
      totalCF += grouped[k].vlr_contabil + grouped[k].frete;
    }
  }
  /* Sort by date (asc), then by value (desc) within same date */
  rows.sort(function(a, b) {
    if (a.data < b.data) return -1;
    if (a.data > b.data) return 1;
    return b.vlr_contabil - a.vlr_contabil;
  });

  var html = '<h2 class="section-title">Faturamento por Cliente \u2014 ' + MONTH_NAMES[CURRENT_MONTH - 1] + '/' + CURRENT_YEAR + ' \u2014 AGRO</h2>';
  html += '<div class="table-container"><table style="font-size:12px"><thead><tr>';
  html += '<th>Data</th><th>Cliente</th><th>Consultor</th><th style="text-align:right">Faturamento</th><th style="text-align:right">Acumulado</th>';
  html += '</tr></thead><tbody>';

  var acum = 0;
  var lastDate = '';
  var showCount = Math.min(rows.length, 40);
  for (var i = 0; i < showCount; i++) {
    var r = rows[i];
    acum += r.vlr_contabil;
    var vlSF = r.vlr_contabil;
    var vlCF = r.vlr_contabil + r.frete;
    /* Format date dd/mm */
    var dtDisplay = '';
    if (r.data && r.data.length >= 10) {
      dtDisplay = r.data.substring(8, 10) + '/' + r.data.substring(5, 7);
    }
    /* Show date only on first row of that date */
    var showDate = (r.data !== lastDate);
    lastDate = r.data;

    html += '<tr' + (showDate && i > 0 ? ' style="border-top:2px solid var(--border-color)"' : '') + '>';
    html += '<td style="font-weight:700;color:var(--text-secondary)">' + (showDate ? dtDisplay : '') + '</td>';
    html += '<td>' + r.cliente + '</td>';
    html += '<td>' + r.consultor + '</td>';
    html += '<td><span data-sf="' + fmtBRL(vlSF) + '" data-cf="' + fmtBRL(vlCF) + '">' + fmtBRL(vlSF) + '</span></td>';
    html += '<td style="color:var(--green);font-weight:600">' + fmtBRL(acum) + '</td></tr>';
  }
  if (rows.length > showCount) {
    html += '<tr><td colspan="5" style="text-align:center;opacity:.5;font-size:10px">... +' + (rows.length - showCount) + ' registros</td></tr>';
  }
  html += '<tr class="total-row"><td></td><td><strong>TOTAL</strong></td><td></td>';
  html += '<td><strong><span data-sf="' + fmtBRL(totalSF) + '" data-cf="' + fmtBRL(totalCF) + '">' + fmtBRL(totalSF) + '</span></strong></td>';
  html += '<td><strong>' + fmtBRL(totalSF) + '</strong></td></tr>';
  html += '</tbody></table></div>';
  document.getElementById('clienteTableSection').innerHTML = html;
}

/* ── DAILY CHART ── */
function renderDailyChart() {
  var monthData = DATA.movFiscal.filter(function(r) { return r.id_tempo === CURRENT_MONTH_STR; });
  var year = CURRENT_YEAR;
  var month = CURRENT_MONTH;
  var daysInMonth = new Date(year, month, 0).getDate();
  var today = NOW.getDate();

  var dailyTotals = {};
  var dailyFrete = {};
  for (var d = 1; d <= daysInMonth; d++) { dailyTotals[d] = 0; dailyFrete[d] = 0; }
  monthData.forEach(function(r) {
    var dt = r.data_emissao || '';
    var day = 0;
    if (dt) {
      var parts = dt.split('-');
      if (parts.length >= 3) day = parseInt(parts[2], 10);
      else {
        parts = dt.split('/');
        if (parts.length >= 1) day = parseInt(parts[0], 10);
      }
    }
    if (day >= 1 && day <= daysInMonth) {
      dailyTotals[day] += safeNum(r.vlr_contabil);
      dailyFrete[day] += safeNum(r.frete_rateado);
    }
  });

  var maxVal = 1;
  var totalMes = 0;
  var diasFaturados = 0;
  var diasUteis = 0;
  for (var d = 1; d <= daysInMonth; d++) {
    if (dailyTotals[d] > maxVal) maxVal = dailyTotals[d];
    totalMes += dailyTotals[d];
    var dow = new Date(year, month - 1, d).getDay();
    if (dow > 0 && dow < 6 && d <= today) diasUteis++;
    if (dailyTotals[d] > 0) diasFaturados++;
  }

  var totalDiasUteis = 0;
  for (var d = 1; d <= daysInMonth; d++) {
    var dow = new Date(year, month - 1, d).getDay();
    if (dow > 0 && dow < 6) totalDiasUteis++;
  }

  var totalFreteMonth = 0;
  for (var d = 1; d <= daysInMonth; d++) totalFreteMonth += dailyFrete[d];
  var mediaDia = diasFaturados > 0 ? totalMes / diasFaturados : 0;
  var mesMeta = 0;
  DATA.planReal.forEach(function(r) {
    if (r.id_tempo === CURRENT_MONTH_STR) mesMeta += safeNum(r.meta);
  });
  var faltaTotal = mesMeta - totalMes;
  var diasUteisRestantes = totalDiasUteis - diasUteis;
  var faltaPorDia = diasUteisRestantes > 0 ? faltaTotal / diasUteisRestantes : 0;
  var metaDiaria = totalDiasUteis > 0 ? mesMeta / totalDiasUteis : 0;
  var metaDiaPct = maxVal > 0 ? (metaDiaria / maxVal * 100) : 0;

  var html = '<div class="daily-chart-section">';
  html += '<h2 class="section-title">Faturamento Diario \u2014 ' + MONTH_NAMES[CURRENT_MONTH - 1] + '/' + CURRENT_YEAR + ' \u2014 AGRO</h2>';
  html += '<div class="dc-summary">';
  html += '<span>Total: <strong style="color:var(--green)"><span data-sf="' + fmtBRL(totalMes) + '" data-cf="' + fmtBRL(totalMes + totalFreteMonth) + '">' + fmtBRL(totalMes) + '</span></strong></span>';
  html += '<span>Dias uteis: <strong>' + totalDiasUteis + '</strong></span>';
  html += '<span>Dias faturados: <strong>' + diasFaturados + '</strong></span>';
  html += '<span>Media/dia: <strong><span data-sf="' + fmtBRL(mediaDia) + '" data-cf="' + fmtBRL(mediaDia + (diasFaturados > 0 ? totalFreteMonth / diasFaturados : 0)) + '">' + fmtBRL(mediaDia) + '</span></strong></span>';
  html += '<span>Meta mes: <strong>' + fmtBRL(mesMeta) + '</strong></span>';
  html += '<span>Falta por dia util: <strong style="color:var(--amber)"><span data-sf="' + fmtBRL(Math.max(0, faltaPorDia)) + '" data-cf="' + fmtBRL(Math.max(0, faltaPorDia - (diasUteisRestantes > 0 ? totalFreteMonth / diasUteisRestantes : 0))) + '">' + fmtBRL(Math.max(0, faltaPorDia)) + '</span></strong></span>';
  html += '</div>';

  html += '<div class="dc-chart-container"><div class="dc-bars-area">';
  if (metaDiaPct > 0 && metaDiaPct < 95) {
    html += '<div class="dc-meta-line" style="bottom:' + Math.min(metaDiaPct, 95) + '%">';
    html += '<span class="dc-meta-label">Media necessaria: ' + fmtBRL(metaDiaria) + '/dia</span></div>';
  }
  html += '<div class="dc-bars">';
  for (var d = 1; d <= daysInMonth; d++) {
    var dow = new Date(year, month - 1, d).getDay();
    var isWeekend = dow === 0 || dow === 6;
    var isFuture = d > today;
    var pctH = maxVal > 0 ? Math.max(1, Math.round(dailyTotals[d] / maxVal * 100)) : 1;
    var colClass = isWeekend ? 'dc-weekend' : (isFuture ? 'dc-future' : '');
    var barColor;
    if (isFuture) barColor = 'rgba(48,54,61,0.4)';
    else if (isWeekend && dailyTotals[d] === 0) barColor = 'rgba(139,148,158,0.3)';
    else if (dailyTotals[d] === 0) barColor = 'rgba(231,76,60,0.3)';
    else barColor = 'var(--green)';
    html += '<div class="dc-bar-col ' + colClass + '">';
    html += '<div class="dc-bar" style="height:' + pctH + '%;background:' + barColor + '"></div></div>';
  }
  html += '</div></div>';

  html += '<div class="dc-labels">';
  for (var d = 1; d <= daysInMonth; d++) {
    var dow = new Date(year, month - 1, d).getDay();
    var isWeekend = dow === 0 || dow === 6;
    var isFuture = d > today;
    var colClass = isWeekend ? 'dc-weekend' : (isFuture ? 'dc-future' : '');
    var valColor = dailyTotals[d] > 0 ? 'var(--green)' : (isFuture || isWeekend ? 'var(--text-secondary)' : 'var(--red)');
    var valText = dailyTotals[d] > 0 ? fmtBRLShort(dailyTotals[d]) : '';
    html += '<div class="dc-label-col ' + colClass + '">';
    html += '<div class="dc-val" style="color:' + valColor + '">' + valText + '</div>';
    html += '<div class="dc-day">' + d + '</div></div>';
  }
  html += '</div></div></div>';
  document.getElementById('dailyChartSection').innerHTML = html;
}

      monthMap[r.id_tempo].meta += safeNum(r.meta);

    }
  });

  html += '<th style="border-left:2px solid var(--green)">Total</th></tr></thead><tbody>';

  html += '<tr><td>Meta</td>';
  var totalMeta = 0;
  ALL_MONTHS.forEach(function(m) {
    html += '<td>' + fmtBRLShort(monthMap[m].meta) + '</td>';

  });
  html += '<td style="border-left:2px solid var(--green)">' + fmtBRLShort(totalMeta) + '</td></tr>';

  });
  html += '<td style="border-left:2px solid var(--green)">' + fmtBRLShort(totalReal) + '</td></tr>';

/* ── CONSULTORES ── */
function renderConsultores() {
  var consultores = {};
  DATA.planRealConsultor.forEach(function(r) {
    var c = r.consultor || r.vendedor || 'OUTROS';
    if (!consultores[c]) {
      consultores[c] = { consultor: c, mesMeta: 0, mesReal: 0, ytdMeta: 0, ytdReal: 0, anoMeta: 0, anoReal: 0 };
    }
    var meta = safeNum(r.meta);
    var real = safeNum(r.realizado);
    if (r.id_tempo === CURRENT_MONTH_STR) {
      consultores[c].mesMeta += meta;
      consultores[c].mesReal += real;
    }
    if (YTD_MONTHS.indexOf(r.id_tempo) >= 0) {
      consultores[c].ytdMeta += meta;
      consultores[c].ytdReal += real;
    }
    consultores[c].anoMeta += meta;
    consultores[c].anoReal += real;
  });

  var carteiraByC = {};
  DATA.carteira.forEach(function(r) {
    var c = r.consultor || r.vendedor || 'OUTROS';
    if (!carteiraByC[c]) carteiraByC[c] = 0;
    carteiraByC[c] += safeNum(r.vlr_carteira);
  });

  var rows = [];
  for (var k in consultores) {
    if (consultores.hasOwnProperty(k)) rows.push(consultores[k]);
  }
  rows.sort(function(a, b) { return b.ytdReal - a.ytdReal; });

  var html = '<h2 class="section-title">Consultores AGRO \u2014 Mes + YTD + Ano</h2>';
  html += '<div class="table-container"><table><thead>';
  html += '<tr><th>Consultor</th>';
  html += '<th colspan="3" style="text-align:center;border-right:2px solid var(--border-color)">MES</th>';
  html += '<th colspan="3" style="text-align:center;border-right:2px solid var(--border-color)">YTD</th>';
  html += '<th colspan="3" style="text-align:center;border-right:2px solid var(--border-color)">ANO</th>';
  html += '<th colspan="2" style="text-align:center">CARTEIRA</th></tr>';
  html += '<tr><th></th><th>Meta</th><th>Real</th><th>Ating%</th><th>Meta</th><th>Real</th><th>Ating%</th><th>Meta</th><th>Real</th><th>%Meta</th><th>Valor</th><th>%Meta</th></tr>';
  html += '</thead><tbody>';

  var totals = { mesMeta: 0, mesReal: 0, ytdMeta: 0, ytdReal: 0, anoMeta: 0, anoReal: 0, carteira: 0 };

  rows.forEach(function(d) {
    var cart = carteiraByC[d.consultor] || 0;
    var mesPct = d.mesMeta > 0 ? (d.mesReal / d.mesMeta * 100) : 0;
    var ytdPct = d.ytdMeta > 0 ? (d.ytdReal / d.ytdMeta * 100) : 0;
    var anoPct = d.anoMeta > 0 ? (d.anoReal / d.anoMeta * 100) : 0;
    var cartPct = d.anoMeta > 0 ? (cart / d.anoMeta * 100) : 0;

    var cName = d.consultor;
    var shortName = cName.split(' ').slice(0, 2).join(' ');

    html += '<tr><td><strong><a href="#" class="consultor-link" title="Ver painel individual">' + shortName + '</a></strong></td>';
    html += '<td>' + fmtBRL(d.mesMeta) + '</td><td>' + fmtBRL(d.mesReal) + '</td>';
    html += '<td class="kpi-percent ' + pctClass(mesPct) + '" style="font-size:11px">' + fmtPctRaw(mesPct) + '</td>';
    html += '<td>' + fmtBRL(d.ytdMeta) + '</td><td>' + fmtBRL(d.ytdReal) + '</td>';
    html += '<td class="kpi-percent ' + pctClass(ytdPct) + '" style="font-size:11px">' + fmtPctRaw(ytdPct) + '</td>';
    html += '<td>' + fmtBRL(d.anoMeta) + '</td><td>' + fmtBRL(d.anoReal) + '</td>';
    html += '<td class="kpi-percent ' + pctClass(anoPct) + '" style="font-size:11px">' + fmtPctRaw(anoPct) + '</td>';
    html += '<td>' + fmtBRL(cart) + '</td>';
    html += '<td>' + fmtPctRaw(cartPct) + '</td></tr>';

    totals.mesMeta += d.mesMeta; totals.mesReal += d.mesReal;
    totals.ytdMeta += d.ytdMeta; totals.ytdReal += d.ytdReal;
    totals.anoMeta += d.anoMeta; totals.anoReal += d.anoReal;
    totals.carteira += cart;
  });

  /* Use vw_plan_vs_real_vertical for accurate annual totals (has all 12 months) */
  var vertAnoMeta = 0, vertAnoReal = 0;
  DATA.planReal.forEach(function(r) {
    vertAnoMeta += safeNum(r.meta);
    vertAnoReal += safeNum(r.realizado);
  });
  totals.anoMeta = vertAnoMeta;
  totals.anoReal = vertAnoReal;

  var tMesPct = totals.mesMeta > 0 ? (totals.mesReal / totals.mesMeta * 100) : 0;
  var tYtdPct = totals.ytdMeta > 0 ? (totals.ytdReal / totals.ytdMeta * 100) : 0;
  var tAnoPct = totals.anoMeta > 0 ? (totals.anoReal / totals.anoMeta * 100) : 0;
  var tCartPct = totals.anoMeta > 0 ? (totals.carteira / totals.anoMeta * 100) : 0;

  html += '<tr class="total-row"><td><strong>TOTAL AGRO</strong></td>';
  html += '<td><strong>' + fmtBRL(totals.mesMeta) + '</strong></td><td><strong>' + fmtBRL(totals.mesReal) + '</strong></td>';
  html += '<td class="kpi-percent ' + pctClass(tMesPct) + '" style="font-size:11px"><strong>' + fmtPctRaw(tMesPct) + '</strong></td>';
  html += '<td><strong>' + fmtBRL(totals.ytdMeta) + '</strong></td><td><strong>' + fmtBRL(totals.ytdReal) + '</strong></td>';
  html += '<td class="kpi-percent ' + pctClass(tYtdPct) + '" style="font-size:11px"><strong>' + fmtPctRaw(tYtdPct) + '</strong></td>';
  html += '<td><strong>' + fmtBRL(totals.anoMeta) + '</strong></td><td><strong>' + fmtBRL(totals.anoReal) + '</strong></td>';
  html += '<td class="kpi-percent ' + pctClass(tAnoPct) + '" style="font-size:11px"><strong>' + fmtPctRaw(tAnoPct) + '</strong></td>';
  html += '<td><strong>' + fmtBRL(totals.carteira) + '</strong></td>';
  html += '<td><strong>' + fmtPctRaw(tCartPct) + '</strong></td></tr>';

  html += '</tbody></table></div>';
  document.getElementById('consultoresSection').innerHTML = html;
}

/* ── CARTEIRA RESUMO ── */
function renderCarteiraResumo() {
  var byConsultor = {};
  DATA.carteira.forEach(function(r) {
    var c = r.consultor || r.vendedor || 'OUTROS';
    if (!byConsultor[c]) byConsultor[c] = { pedidos: 0, clientes: {}, valor: 0 };
    byConsultor[c].pedidos++;
    byConsultor[c].clientes[r.cliente || ''] = true;
    byConsultor[c].valor += safeNum(r.vlr_carteira);
  });

  var totalVal = 0;
  var rows = [];
  for (var k in byConsultor) {
    if (byConsultor.hasOwnProperty(k)) {
      var d = byConsultor[k];
      totalVal += d.valor;
      rows.push({ consultor: k, pedidos: d.pedidos, clientes: Object.keys(d.clientes).length, valor: d.valor });
    }
  }
  rows.sort(function(a, b) { return b.valor - a.valor; });

  var html = '<h2 class="section-title">Carteira de Pedidos AGRO \u2014 Por Consultor</h2>';
  html += '<div class="table-container"><table><thead><tr><th>Consultor</th><th>Pedidos</th><th>Clientes</th><th>Valor</th><th>% Total</th></tr></thead><tbody>';

  rows.forEach(function(r) {
    var pct = totalVal > 0 ? (r.valor / totalVal * 100) : 0;
    html += '<tr><td>' + r.consultor + '</td><td>' + r.pedidos + '</td><td>' + r.clientes + '</td>';
    html += '<td>' + fmtBRL(r.valor) + '</td><td>' + fmtPctRaw(pct) + '</td></tr>';
  });

  html += '<tr class="total-row"><td><strong>TOTAL</strong></td><td></td><td></td>';
  html += '<td><strong>' + fmtBRL(totalVal) + '</strong></td><td><strong>100%</strong></td></tr>';
  html += '</tbody></table></div>';
  document.getElementById('carteiraResumoSection').innerHTML = html;
}

/* ── CARTEIRA DETALHADO ── */
function renderCarteiraDetalhado() {
  var rows = DATA.carteira.slice().sort(function(a, b) { return safeNum(b.vlr_carteira) - safeNum(a.vlr_carteira); });

  var showCount = Math.min(rows.length, 30);

    html += '<td>' + (r.cliente || '') + '</td>';
    html += '<td>' + (r.produto || r.categoria_produto || '') + '</td>';
    html += '<td>' + (r.qtd || r.quantidade || '') + '</td>';

  document.getElementById('carteiraDetalhadoSection').innerHTML = html;

/* ── FATURAMENTO POR UF ── */
function renderUF() {
  var ytdData = DATA.movFiscal.filter(function(r) { return YTD_MONTHS.indexOf(r.id_tempo) >= 0; });
  var byUF = {};
  var totalUF = 0;
  ytdData.forEach(function(r) {
    var uf = r.uf || 'N/A';
    if (!byUF[uf]) byUF[uf] = { vlr: 0, frete: 0 };
    byUF[uf].vlr += safeNum(r.vlr_contabil);
    byUF[uf].frete += safeNum(r.frete_rateado);
    totalUF += safeNum(r.vlr_contabil);
  });

  var rows = [];
  for (var k in byUF) {
    if (byUF.hasOwnProperty(k)) rows.push({ uf: k, vlr: byUF[k].vlr, frete: byUF[k].frete });
  }
  rows.sort(function(a, b) { return b.vlr - a.vlr; });

  var html = '<h2 class="section-title">Faturamento por UF \u2014 YTD \u2014 AGRO</h2>';
  html += '<div class="table-container"><table><thead><tr><th>UF</th><th>Faturamento</th><th>% Total</th><th>Acum%</th></tr></thead><tbody>';

  var acum = 0;
  rows.forEach(function(r) {
    var pct = totalUF > 0 ? (r.vlr / totalUF * 100) : 0;
    acum += pct;
    html += '<tr><td>' + r.uf + '</td>';
    html += '<td><span data-sf="' + fmtBRL(r.vlr) + '" data-cf="' + fmtBRL(r.vlr + r.frete) + '">' + fmtBRL(r.vlr) + '</span></td>';
    html += '<td>' + fmtPctRaw(pct) + '</td>';
    html += '<td>' + fmtPctRaw(acum) + '</td></tr>';
  });

  html += '<tr class="total-row"><td><strong>TOTAL</strong></td>';
  html += '<td><strong>' + fmtBRL(totalUF) + '</strong></td><td><strong>100%</strong></td><td></td></tr>';
  html += '</tbody></table></div>';
  document.getElementById('ufSection').innerHTML = html;
}

/* ── CLIENTES 80/20 ── */
function renderClientes8020() {
  var byCliente = {};
  var totalReal = 0;
  /* vw_plan_vs_real_cliente has no id_tempo — it's already annual aggregate */

    var c = r.cliente || 'N/A';

    byCliente[c].real += safeNum(r.realizado);
    totalReal += safeNum(r.realizado);
  });

  var rows = [];
  for (var k in byCliente) {
    if (byCliente.hasOwnProperty(k)) rows.push({ cliente: k, meta: byCliente[k].meta, real: byCliente[k].real });

  rows.sort(function(a, b) { return b.real - a.real; });

  var html = '<h2 class="section-title">Clientes 80/20 AGRO \u2014 Plano vs Realizado</h2>';

  var acum = 0;
  var showCount = Math.min(rows.length, 30);

    html += '<td>' + fmtBRL(r.real) + '</td>';

    html += '<td>' + fmtPctRaw(acum) + '</td></tr>';
  }
  if (rows.length > showCount) {
    html += '<tr><td colspan="6" style="text-align:center;opacity:.5;font-size:10px">... +' + (rows.length - showCount) + ' clientes</td></tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('clientes8020Section').innerHTML = html;
}

/* ── PRODUTOS (CATEGORIA) 80/20 ── */
function renderProdutos8020() {

/* ── CFOP ── */
function renderCFOP() {
  var ytdData = DATA.movFiscal.filter(function(r) { return YTD_MONTHS.indexOf(r.id_tempo) >= 0; });
  var byCfop = {};
  var totalVlr = 0;
  ytdData.forEach(function(r) {
    var cfop = r.cfop || 'N/A';
    var op = r.operacao || '';
    var key = cfop + '|' + op;
    if (!byCfop[key]) byCfop[key] = { cfop: cfop, operacao: op, vlr: 0, frete: 0, nfs: 0 };
    byCfop[key].vlr += safeNum(r.vlr_contabil);
    byCfop[key].frete += safeNum(r.frete_rateado);
    byCfop[key].nfs++;
    totalVlr += safeNum(r.vlr_contabil);
  });

  var rows = [];
  for (var k in byCfop) {
    if (byCfop.hasOwnProperty(k)) rows.push(byCfop[k]);
  }
  rows.sort(function(a, b) { return b.vlr - a.vlr; });

  var html = '<h2 class="section-title">Por Operacao / CFOP \u2014 YTD \u2014 AGRO</h2>';
  html += '<div class="table-container"><table><thead><tr><th>CFOP</th><th>Operacao</th><th>NFs</th><th>Faturamento</th><th>% Total</th></tr></thead><tbody>';

  rows.forEach(function(r) {
    var pct = totalVlr > 0 ? (r.vlr / totalVlr * 100) : 0;
    html += '<tr><td>' + r.cfop + '</td>';
    html += '<td>' + r.operacao + '</td>';
    html += '<td>' + r.nfs + '</td>';
    html += '<td><span data-sf="' + fmtBRL(r.vlr) + '" data-cf="' + fmtBRL(r.vlr + r.frete) + '">' + fmtBRL(r.vlr) + '</span></td>';
    html += '<td>' + fmtPctRaw(pct) + '</td></tr>';
  });

  html += '<tr class="total-row"><td><strong>TOTAL</strong></td><td></td><td></td>';
  html += '<td><strong>' + fmtBRL(totalVlr) + '</strong></td><td><strong>100%</strong></td></tr>';
  html += '</tbody></table></div>';
  document.getElementById('cfopSection').innerHTML = html;
}

/* ── FRETE SECTION (AGRO specific) ── */
function renderFreteSection() {
  var ytdData = DATA.movFiscal.filter(function(r) { return YTD_MONTHS.indexOf(r.id_tempo) >= 0; });
  var mesData = DATA.movFiscal.filter(function(r) { return r.id_tempo === CURRENT_MONTH_STR; });

  var totalFreteMes = 0, totalFatMes = 0;
  mesData.forEach(function(r) {
    totalFreteMes += safeNum(r.frete_rateado);
    totalFatMes += safeNum(r.vlr_contabil);
  });

  var totalFreteYtd = 0, totalFatYtd = 0;
  ytdData.forEach(function(r) {
    totalFreteYtd += safeNum(r.frete_rateado);
    totalFatYtd += safeNum(r.vlr_contabil);
  });

  var fretePctMes = totalFatMes > 0 ? (totalFreteMes / totalFatMes * 100) : 0;
  var fretePctYtd = totalFatYtd > 0 ? (totalFreteYtd / totalFatYtd * 100) : 0;

  /* By client for AGRO */
  var byCliente = {};
  ytdData.forEach(function(r) {
    var c = r.cliente || 'N/A';
    if (!byCliente[c]) byCliente[c] = { vlr: 0, frete: 0 };
    byCliente[c].vlr += safeNum(r.vlr_contabil);
    byCliente[c].frete += safeNum(r.frete_rateado);
  });

  var html = '<h2 class="section-title">Analise de Fretes \u2014 YTD ' + CURRENT_YEAR + ' \u2014 AGRO</h2>';
  html += '<div class="kpi-section" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">';
  html += '<div class="kpi-card" style="border-top:3px solid var(--amber)"><div class="kpi-title">Gap Frete YTD</div>';
  html += '<div class="kpi-value" style="color:var(--amber)">' + fmtBRL(totalFreteYtd) + '</div>';
  html += '<div class="kpi-row"><span class="kpi-label">% do Faturamento:</span><span class="kpi-number" style="color:var(--amber)">' + fmtPctRaw(fretePctYtd) + '</span></div></div>';
  html += '<div class="kpi-card" style="border-top:3px solid var(--amber)"><div class="kpi-title">Frete Mes Atual</div>';
  html += '<div class="kpi-value" style="color:var(--amber)">' + fmtBRL(totalFreteMes) + '</div>';
  html += '<div class="kpi-row"><span class="kpi-label">% do Fat. Mes:</span><span class="kpi-number" style="color:var(--amber)">' + fmtPctRaw(fretePctMes) + '</span></div></div>';
  html += '<div class="kpi-card" style="border-top:3px solid var(--amber)"><div class="kpi-title">Fat. Liquido YTD</div>';
  html += '<div class="kpi-value" style="color:var(--green)">' + fmtBRL(totalFatYtd) + '</div>';
  html += '<div class="kpi-row"><span class="kpi-label">c/ Frete:</span><span class="kpi-number">' + fmtBRL(totalFatYtd + totalFreteYtd) + '</span></div></div>';
  html += '</div>';

  /* Frete table by client */
  html += '<div class="table-container"><table><thead>';
  html += '<tr><th>Cliente</th><th>Fat. s/ Frete</th><th style="color:var(--amber)">Frete</th><th>Fat. c/ Frete</th><th>Frete %</th></tr>';
  html += '</thead><tbody>';

  var cRows = [];
  for (var ck in byCliente) {
    if (byCliente.hasOwnProperty(ck)) {
      cRows.push({ cliente: ck, vlr: byCliente[ck].vlr, frete: byCliente[ck].frete });
    }
  }
  cRows.sort(function(a, b) { return b.frete - a.frete; });

  var showMax = Math.min(cRows.length, 30);
  for (var ci = 0; ci < showMax; ci++) {
    var cr = cRows[ci];
    var cfp = cr.vlr > 0 ? (cr.frete / cr.vlr * 100) : 0;
    var cfpClass = cfp > 10 ? 'metric-bad' : cfp > 5 ? 'metric-warning' : 'metric-good';
    html += '<tr>';
    html += '<td>' + cr.cliente + '</td>';
    html += '<td>' + fmtBRL(cr.vlr) + '</td>';
    html += '<td style="color:var(--amber)">' + fmtBRL(cr.frete) + '</td>';
    html += '<td>' + fmtBRL(cr.vlr + cr.frete) + '</td>';
    html += '<td class="' + cfpClass + '">' + fmtPctRaw(cfp) + '</td></tr>';
  }
  if (cRows.length > showMax) {
    html += '<tr><td style="opacity:.5;font-size:10px">... +' + (cRows.length - showMax) + ' clientes</td><td colspan="4"></td></tr>';
  }

  html += '<tr class="total-row"><td><strong>TOTAL AGRO</strong></td>';
  html += '<td><strong>' + fmtBRL(totalFatYtd) + '</strong></td>';
  html += '<td style="color:var(--amber)"><strong>' + fmtBRL(totalFreteYtd) + '</strong></td>';
  html += '<td><strong>' + fmtBRL(totalFatYtd + totalFreteYtd) + '</strong></td>';
  html += '<td class="metric-good"><strong>' + fmtPctRaw(fretePctYtd) + '</strong></td></tr>';
  html += '</tbody></table></div>';

  document.getElementById('freteSection').innerHTML = html;
}

/* ── FRETE TOGGLE ── */
function toggleFrete() {
  _showFrete = !_showFrete;
  applyFreteState();
}

function applyFreteState() {
  var els = document.querySelectorAll('[data-sf]');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    el.textContent = _showFrete ? el.getAttribute('data-cf') : el.getAttribute('data-sf');
    if (el.hasAttribute('data-cls-sf') && el.hasAttribute('data-cls-cf')) {
      el.className = _showFrete ? el.getAttribute('data-cls-cf') : el.getAttribute('data-cls-sf');
    }
  }
  var btn = document.getElementById('freteToggle');
  var ind = document.getElementById('freteIndicator');
  if (btn) { btn.textContent = _showFrete ? 'COM FRETE' : 'SEM FRETE'; if (_showFrete) { btn.classList.add('active'); } else { btn.classList.remove('active'); } }
  if (ind) { ind.textContent = _showFrete ? 'Valores: COM frete (bruto)' : 'Valores: SEM frete (liquido)'; }
}

function toggleFreteVert(el) {
  if (el.classList.contains('open')) { el.classList.remove('open'); } else { el.classList.add('open'); }
  var g = el.getAttribute('data-vert-group');
  var rows = document.querySelectorAll('.frete-cli-' + g);
  var show = el.classList.contains('open');
  for (var i = 0; i < rows.length; i++) {
    if (show) { rows[i].classList.add('show'); } else { rows[i].classList.remove('show'); }
  }
}

/* ── CLOCK ── */
function updateClock() {
  var n = new Date();
  var h = n.getHours(); var m = n.getMinutes(); var s = n.getSeconds();
  document.getElementById('clock').textContent = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  document.getElementById('clockDate').textContent = DIAS_SEMANA[n.getDay()] + ', ' + n.getDate() + ' ' + MONTH_NAMES[n.getMonth()];
}

/* ── REFRESH TIMER ── */
function updateRefreshTimer() {
  var m = Math.floor(rc / 60);
  var s = rc % 60;
  document.getElementById('refreshTimer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
  rc--;
  if (rc < 0) {
    rc = 300;
    loadData();
  }
}

/* ── FULLSCREEN ── */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function(e) {});
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
});

/* ── INIT ── */
updateClock();
updateRefreshTimer();
setInterval(updateClock, 1000);
setInterval(updateRefreshTimer, 1000);
loadData();
</script></body></html>
